spring.application.name=quiz-api

# Cloud platforms (Render, Railway, Fly.io, etc.) set PORT; default 8080 locally
server.port=${PORT:8080}

# --- CORS (only matters if the browser page is on a different origin than the API) ---
# Same app (UI + API in one JAR on one URL): you do not need to change this.

# Set to true for a quick public demo so any website can call your API (do not use for private data).
quiz.cors.allow-all=${QUIZ_CORS_ALLOW_ALL:false}

# Comma-separated extra allowed origins, e.g. https://myquiz.netlify.app,https://www.mydomain.com
quiz.cors.additional-origins=${QUIZ_CORS_ORIGINS:}
